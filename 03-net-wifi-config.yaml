network:
  version: 2
  wifis:
    [NET_WIFI_IF_NAME]:
      renderer: NetworkManager
      dhcp4: yes
      dhcp6: no
      dhcp4-overrides:
        use-dns: no
      nameservers:
        addresses: [127.0.0.1]
      access-points:
        "[NET_WIFI_AUTH_SSID]":
          password: "[NET_WIFI_AUTH_PASS]"
